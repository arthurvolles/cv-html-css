<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fontes Externas</title>
    <style>
        @font-face {
            font-family: medieval;
            src: url(fontes/OldLondon.ttf) format(tuetype), url(fontes/OldLondonAlternate.ttf) format(truetype), url(fontes/Olondon_.otf) format(opentype), url(fontes/Olondona.otf) format(truetype);
            font-weight: normal;
            font-style: normal;
        }
        body {
            font-family: 'medieval'; 
            font-size: 2em;
        }

        h1 {
            font-family: 'medieval'; 
            font-size: 3em;
        }
    </style>
</head>
<body>
    <h1>Titulos</h1>
    <p>Lorem ipsum dolor sit amet consectetur, adipisicing elit. Delectus error tempore non consectetur unde dolorum totam enim libero hic natus perspiciatis at mollitia tempora consequatur, quos in nobis iusto officiis.</p>
</body>
</html>
